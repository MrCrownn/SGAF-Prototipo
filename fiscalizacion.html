<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SGAF - Fiscalizador PDA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body class="bg-[#0f2c59] h-screen font-sans">

    <div id="loginScreen" class="h-full flex items-center justify-center p-4">
        <div class="w-full max-w-sm bg-white p-8 rounded-3xl shadow-2xl flex flex-col items-center">
            
            <div class="flex items-center justify-center mb-8">
                <svg aria-hidden="true" class="h-14 w-14 mr-3" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                    <path d="M10,10 L90,10 L90,70 C90,85 50,100 50,100 C50,100 10,85 10,70 Z" fill="#d52b1e"/>
                    <path d="M10,10 L50,10 L50,100 C50,100 10,85 10,70 Z" fill="#0039a6"/>
                    <polygon points="50,25 56,40 72,40 59,50 64,65 50,55 36,65 41,50 28,40 44,40" fill="#ffffff"/>
                </svg>
                <div class="border-l-2 border-gray-300 pl-3 text-left">
                    <h1 class="text-xl font-bold text-[#0f2c59] leading-tight">Aduanas de Chile</h1>
                    <p class="text-[10px] text-gray-500 uppercase tracking-widest">Gobierno de Chile</p>
                </div>
            </div>

            <h2 class="text-sm font-bold text-gray-400 uppercase tracking-widest mb-6">Acceso Fiscalizador</h2>
            
            <div class="w-full space-y-4">
                <input type="text" id="user" placeholder="RUT (ej: 1-9)" class="w-full p-4 border rounded-xl bg-gray-50 outline-none focus:ring-2 focus:ring-[#0f2c59]">
                <input type="password" id="pass" placeholder="Contraseña" class="w-full p-4 border rounded-xl bg-gray-50 outline-none focus:ring-2 focus:ring-[#0f2c59]">
                <button onclick="validarLogin()" class="w-full bg-[#0f2c59] text-white py-4 rounded-xl font-bold shadow-lg active:scale-95 transition-transform">INGRESAR</button>
            </div>
        </div>
    </div>

    <div id="scannerScreen" class="hidden h-full flex flex-col bg-gray-50">
        
        <header class="bg-[#0f2c59] text-white p-3 flex items-center justify-between shadow-md z-10">
            <div class="flex items-center">
                <svg aria-hidden="true" class="h-10 w-10 mr-3" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                    <path d="M10,10 L90,10 L90,70 C90,85 50,100 50,100 C50,100 10,85 10,70 Z" fill="#d52b1e"/>
                    <path d="M10,10 L50,10 L50,100 C50,100 10,85 10,70 Z" fill="#0039a6"/>
                    <polygon points="50,25 56,40 72,40 59,50 64,65 50,55 36,65 41,50 28,40 44,40" fill="#ffffff"/>
                </svg>
                <div class="border-l border-gray-400 pl-3">
                    <h1 class="text-sm font-bold tracking-wide leading-tight">Aduanas de Chile</h1>
                    <p class="text-[8px] text-gray-300 uppercase tracking-widest">Gobierno de Chile</p>
                </div>
            </div>
            <span class="bg-blue-800 text-[10px] px-2 py-1 rounded-full border border-blue-400 shadow-sm hidden sm:block">SGAF - Offline</span>
        </header>

        <div class="flex-1 overflow-y-auto flex flex-col p-4 space-y-4">
            
            <div id="controlesScanner" class="flex gap-2">
                <button onclick="iniciarCamara()" class="flex-1 bg-blue-100 text-blue-800 py-3 rounded-xl font-bold text-xs border border-blue-300 shadow-sm flex items-center justify-center gap-2">
                    <span>📸</span> Usar Cámara
                </button>
                <button onclick="document.getElementById('fileQr').click()" class="flex-1 bg-gray-100 text-gray-800 py-3 rounded-xl font-bold text-xs border border-gray-300 shadow-sm flex items-center justify-center gap-2">
                    <span>📁</span> Subir QR
                </button>
                <input type="file" id="fileQr" accept="image/*" class="hidden" onchange="escanearArchivo(event)">
            </div>

            <div id="camaraContainer" class="rounded-2xl overflow-hidden shadow-md border-2 border-white bg-white">
                <div id="reader" class="w-full min-h-[200px] bg-black flex items-center justify-center text-gray-500 text-sm">Cámara Inactiva</div>
            </div>
            
            <div id="resultadoPDA" class="hidden p-6 rounded-2xl border text-center shadow-lg transition-all bg-white">
                <h2 id="estado" class="text-xl font-bold mb-2"></h2>
                <div id="detalles" class="text-sm text-gray-700"></div>
                <button onclick="reiniciarEscaneo()" class="w-full mt-4 bg-[#0f2c59] text-white py-3 rounded-xl font-bold shadow-md">NUEVO ESCANEO</button>
            </div>

            <div class="bg-white rounded-2xl shadow-md border border-gray-200 p-4 flex-1 flex flex-col">
                <div class="flex justify-between items-center mb-3 border-b pb-2">
                    <h3 class="text-sm font-bold text-gray-700">Bitácora Local (Logs)</h3>
                    <span id="contadorLogs" class="bg-gray-200 text-gray-700 text-xs font-bold px-2 py-1 rounded-full">0</span>
                </div>
                
                <div id="listaLogs" class="flex-1 overflow-y-auto space-y-2 max-h-40 mb-4 text-xs">
                    <p id="emptyLogsMsg" class="text-gray-400 text-center italic mt-4">Sin registros pendientes.</p>
                </div>

                <div class="border-t pt-3">
                    <p id="estadoSincronizacion" class="text-[10px] text-gray-500 text-center mb-2">Última sincronización: Nunca</p>
                    <button onclick="sincronizarNube()" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-2 rounded-lg font-bold shadow flex items-center justify-center gap-2 transition-colors">
                        Sincronizar en la Nube
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let html5QrCode;
        let registrosLocales = [];

        // Autocompletado de RUT
        document.getElementById('user').addEventListener('input', (e) => {
            let val = e.target.value.replace(/[^0-9kK]/g, '');
            if (val.length > 1) val = val.slice(0, -1) + '-' + val.slice(-1);
            e.target.value = val.toUpperCase();
        });

        function validarLogin() {
            if (document.getElementById('user').value === "1-9" && document.getElementById('pass').value === "12345678") {
                document.getElementById('loginScreen').classList.add('hidden');
                document.getElementById('scannerScreen').classList.remove('hidden');
                
                // Instanciar la versión CORE de la librería, no el Scanner con UI por defecto
                html5QrCode = new Html5Qrcode("reader");
            } else { 
                alert("Credenciales incorrectas"); 
            }
        }

        function iniciarCamara() {
            document.getElementById('camaraContainer').classList.remove('hidden');
            document.getElementById('resultadoPDA').classList.add('hidden');
            document.getElementById('controlesScanner').classList.add('hidden');
            
            html5QrCode.start(
                { facingMode: "environment" }, 
                { fps: 10, qrbox: { width: 250, height: 250 } },
                (decodedText) => {
                    html5QrCode.stop().then(() => procesarEscaneo(decodedText));
                },
                (errorMessage) => { /* Ignorar errores de lectura constantes */ }
            ).catch(err => {
                alert("Error al iniciar la cámara. Asegúrate de dar los permisos.");
                document.getElementById('controlesScanner').classList.remove('hidden');
            });
        }
        function escanearArchivo(event) {
            if (event.target.files.length == 0) return;
            
            document.getElementById('camaraContainer').classList.remove('hidden');
            document.getElementById('resultadoPDA').classList.add('hidden');
            
            const file = event.target.files[0];
            html5QrCode.scanFile(file, true)
                .then(decodedText => {
                    procesarEscaneo(decodedText);
                })
                .catch(err => {
                    alert("No se detectó un código QR válido en la imagen.");
                });
                
            // Reset input file
            event.target.value = "";
        }
        function procesarEscaneo(text) {
            document.getElementById('camaraContainer').classList.add('hidden');
            document.getElementById('controlesScanner').classList.add('hidden');
            
            const resDiv = document.getElementById('resultadoPDA');
            let data;
            
            try { data = JSON.parse(text); } 
            catch (e) { data = { titular: "Desconocido", id_trx: "Error-Formato" }; }
            
            resDiv.classList.remove('hidden');
            let estadoTexto = "";
            let colorClase = "";
            
            let htmlPasajeros = "";
            if (data.pasajeros && data.pasajeros.length > 0) {
                htmlPasajeros = `
                    <div class="mt-4 bg-white/60 p-3 rounded-lg border border-gray-300 text-left shadow-sm">
                        <p class="text-[10px] font-bold text-gray-500 uppercase tracking-wider mb-2">Validación de Identidad en Ventanilla:</p>
                        <ul class="space-y-2">
                `;
                data.pasajeros.forEach((p, index) => {
                    htmlPasajeros += `
                        <li class="flex flex-col border-b border-gray-200/50 pb-1 last:border-0 last:pb-0">
                            <span class="text-xs text-gray-500">Pasajero ${index + 1}</span>
                            <span class="font-bold text-sm text-gray-900">${p.doc}</span>
                            <span class="text-xs text-gray-700 truncate capitalize">${p.nombre}</span>
                        </li>`;
                });
                htmlPasajeros += `</ul></div>`;
            } else {
                htmlPasajeros = `<div class="mt-3 p-2 bg-white/60 rounded border text-left"><span class="text-xs font-bold">Titular:</span> ${data.titular}</div>`;
            }
            
            if (data.titular === "1-9") {
                colorClase = "bg-red-50 border-red-300";
                estadoTexto = "❌ RECHAZADO";
                resDiv.className = `p-6 rounded-2xl border text-center shadow-lg transition-all ${colorClase}`;
                document.getElementById('estado').innerHTML = estadoTexto;
                document.getElementById('detalles').innerHTML = `
                    <p class="font-bold text-red-700">Alerta PDI Detectada</p>
                    <p class="text-xs mt-1 mb-2">Derive a la persona a unidad de control.</p>
                    ${htmlPasajeros}
                `;
            } else if (data.sag === "PENDIENTE") {
                colorClase = "bg-yellow-50 border-yellow-300";
                estadoTexto = "⚠️ PENDIENTE";
                resDiv.className = `p-6 rounded-2xl border text-center shadow-lg transition-all ${colorClase}`;
                document.getElementById('estado').innerHTML = estadoTexto;
                document.getElementById('detalles').innerHTML = `
                    <p class="font-bold text-yellow-700">Falta Validación SAG</p>
                    <p class="text-xs mt-1 mb-2">Trámite fitosanitario no acreditado.</p>
                    ${htmlPasajeros}
                `;
            } else {
                colorClase = "bg-green-50 border-green-400";
                estadoTexto = "✅ AUTORIZADO";
                resDiv.className = `p-6 rounded-2xl border-2 text-center shadow-lg transition-all ${colorClase}`;
                document.getElementById('estado').innerHTML = estadoTexto;
                document.getElementById('detalles').innerHTML = `
                    <p class="font-bold text-green-700 text-sm">ID: ${data.id_trx}</p>
                    <p class="text-xs text-green-800 mt-1 mb-2">Validaciones interinstitucionales aprobadas.</p>
                    ${htmlPasajeros}
                `;
            }
            
            if (navigator.vibrate) navigator.vibrate(200);
            agregarLog(data.titular, estadoTexto, colorClase);
        }

        function agregarLog(rut, estado, colorClase) {
            const listaLogs = document.getElementById('listaLogs');
            const emptyMsg = document.getElementById('emptyLogsMsg');
            if (emptyMsg) emptyMsg.remove();

            const horaActual = new Date().toLocaleTimeString('es-CL', { hour: '2-digit', minute:'2-digit', second:'2-digit' });
            
            const logItem = document.createElement('div');
            logItem.className = `p-2 rounded border ${colorClase} flex justify-between items-center`;
            logItem.innerHTML = `
                <div>
                    <p class="font-bold text-gray-800">${rut}</p>
                    <p class="text-[10px] text-gray-500">${horaActual}</p>
                </div>
                <div class="text-xs font-bold">${estado}</div>
            `;
            
            listaLogs.prepend(logItem);
            registrosLocales.push({ rut, estado, hora: horaActual });
            document.getElementById('contadorLogs').innerText = registrosLocales.length;
        }

        function reiniciarEscaneo() {
            document.getElementById('resultadoPDA').classList.add('hidden');
            document.getElementById('camaraContainer').classList.remove('hidden');
            document.getElementById('controlesScanner').classList.remove('hidden');
        }

        function sincronizarNube() {
            const btn = document.querySelector('button[onclick="sincronizarNube()"]');
            if (registrosLocales.length === 0) { alert("No hay registros nuevos para sincronizar."); return; }

            btn.innerText = "Sincronizando...";
            btn.disabled = true;

            setTimeout(() => {
                const fecha = new Date();
                document.getElementById('estadoSincronizacion').innerHTML = `Última sincronización: <span class="font-bold text-green-600">${fecha.toLocaleDateString()} - ${fecha.toLocaleTimeString()}</span>`;
                document.getElementById('listaLogs').innerHTML = `<p id="emptyLogsMsg" class="text-green-600 font-bold text-center italic mt-4">✅ Datos subidos al servidor central.</p>`;
                registrosLocales = [];
                document.getElementById('contadorLogs').innerText = "0";
                btn.innerText = "Sincronizar en la Nube";
                btn.disabled = false;
            }, 1000);
        }
    </script>
</body>
</html>
